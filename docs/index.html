<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>공모전 데일리 보드</title>
  <link rel="icon" type="image/svg+xml" href="./favicon.svg" />
  <style>
    :root {
      --bg1: #f5f1e6;
      --bg2: #d9ead8;
      --ink: #1f2a24;
      --muted: #5a6b61;
      --card: #fffef9;
      --line: #cfd8cd;
      --accent: #2f7d57;
      --accent2: #1f5a3f;
      --chip-bg: #eef5ec;
      --warn: #9c5a19;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      color: var(--ink);
      font-family: "Noto Sans KR", "Malgun Gothic", sans-serif;
      background: radial-gradient(circle at 10% 10%, #fff7df 0%, transparent 40%),
                  radial-gradient(circle at 90% 20%, #d9f2dd 0%, transparent 35%),
                  linear-gradient(135deg, var(--bg1), var(--bg2));
      min-height: 100vh;
    }

    .wrap {
      width: min(1000px, 92vw);
      margin: 40px auto 60px;
    }

    .hero {
      padding: 24px;
      border: 1px solid var(--line);
      border-radius: 18px;
      background: rgba(255, 255, 255, 0.75);
      backdrop-filter: blur(4px);
      box-shadow: 0 8px 30px rgba(26, 47, 35, 0.08);
      animation: rise 0.6s ease;
    }

    h1 {
      margin: 0;
      font-size: clamp(24px, 3.3vw, 38px);
      letter-spacing: -0.02em;
    }

    .meta {
      margin-top: 8px;
      color: var(--muted);
      font-size: 14px;
    }

    .count {
      margin-top: 14px;
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    .controls {
      margin-top: 16px;
      display: grid;
      gap: 10px;
      grid-template-columns: 1fr;
    }

    .mode-row,
    .filter-row {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      align-items: center;
    }

    .mode-btn {
      border: 1px solid var(--line);
      border-radius: 999px;
      padding: 8px 12px;
      background: #fff;
      color: var(--ink);
      font-size: 13px;
      cursor: pointer;
    }

    .mode-btn.active {
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      color: #fff;
      border-color: transparent;
    }

    .filter-input,
    .filter-select {
      border: 1px solid var(--line);
      border-radius: 10px;
      padding: 9px 10px;
      background: #fff;
      color: var(--ink);
      font-size: 13px;
    }

    .filter-input {
      min-width: 220px;
      flex: 1;
    }

    .result-hint {
      color: var(--muted);
      font-size: 13px;
      margin: 0;
    }

    .pill {
      border: 1px solid var(--line);
      border-radius: 999px;
      padding: 7px 12px;
      font-size: 14px;
      background: #fff;
    }

    .grid {
      margin-top: 24px;
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 14px;
    }

    .card {
      border: 1px solid var(--line);
      border-radius: 14px;
      background: var(--card);
      padding: 14px;
      display: grid;
      gap: 8px;
      transition: transform 0.2s ease, box-shadow 0.2s ease;
      opacity: 0;
      transform: translateY(8px);
      animation: rise 0.5s ease forwards;
    }

    .card:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(19, 54, 34, 0.12);
    }

    .source {
      display: inline-block;
      width: fit-content;
      font-size: 12px;
      color: #fff;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      border-radius: 999px;
      padding: 4px 9px;
    }

    .title {
      margin: 0;
      font-size: 16px;
      line-height: 1.45;
    }

    .deadline {
      font-size: 13px;
      color: var(--muted);
    }

    .deadline.warn {
      color: var(--warn);
      font-weight: 600;
    }

    a.btn {
      display: inline-block;
      width: fit-content;
      text-decoration: none;
      border: 1px solid var(--line);
      border-radius: 10px;
      padding: 8px 11px;
      color: var(--ink);
      background: #fff;
      font-size: 13px;
    }

    .empty {
      margin-top: 14px;
      color: var(--muted);
      font-size: 14px;
    }

    @keyframes rise {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @media (max-width: 640px) {
      .wrap { margin-top: 20px; }
      .hero { padding: 18px; }
    }
  </style>
</head>
<body>
  <main class="wrap">
    <section class="hero">
      <h1>공모전 데일리 보드</h1>
      <p class="meta" id="updated">업데이트 정보를 불러오는 중...</p>
      <div class="count">
        <span class="pill" id="todayCount">오늘 0건</span>
        <span class="pill" id="totalCount">전체 0건</span>
      </div>
      <div class="controls">
        <div class="mode-row" id="modeRow">
          <button class="mode-btn" data-mode="today">오늘</button>
          <button class="mode-btn" data-mode="recent">최근</button>
          <button class="mode-btn" data-mode="all">전체</button>
        </div>
        <div class="filter-row">
          <select class="filter-select" id="sourceFilter">
            <option value="all">전체 소스</option>
            <option value="wevity">위비티</option>
            <option value="thinkcontest">씽굿</option>
            <option value="allcon">올콘</option>
          </select>
          <input class="filter-input" id="searchInput" type="text" placeholder="제목 검색 (예: 디자인, 서포터즈, 창업)" />
        </div>
      </div>
      <p class="result-hint" id="resultHint"></p>
      <p class="empty" id="status"></p>
    </section>

    <section class="grid" id="list"></section>
  </main>

  <script>
    // GitHub Pages에서 생성된 최신 JSON 파일을 읽어 화면에 렌더링합니다.
    async function load() {
      // GitHub Pages 서브경로(.../contest-bot/)에서도 동작하도록 경로를 잡습니다.
      const basePath = window.location.pathname.includes('contest-bot') 
        ? '/contest-bot/data/latest.json' 
        : './data/latest.json';
      const res = await fetch(basePath, { cache: 'no-store' });
      if (!res.ok) throw new Error('latest.json 로드 실패');
      return res.json();
    }

    function toLocalText(iso) {
      if (!iso) return '-';
      const d = new Date(iso);
      return d.toLocaleString('ko-KR', { hour12: false });
    }

    function escapeHtml(text) {
      return String(text || '')
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#39;');
    }

    function sourceLabel(source) {
      if (source === 'wevity') return '위비티';
      if (source === 'thinkcontest') return '씽굿';
      if (source === 'allcon') return '올콘';
      return source || 'unknown';
    }

    function makeCard(item, idx) {
      const deadline = item.deadline || '-';
      const deadlineClass = deadline.includes('없음') || deadline.includes('확인 필요') ? 'deadline warn' : 'deadline';
      return `
        <article class="card" style="animation-delay:${Math.min(idx * 40, 500)}ms">
          <span class="source">${sourceLabel(item.source)}</span>
          <h3 class="title">${escapeHtml(item.title || '')}</h3>
          <div class="${deadlineClass}">접수/마감: ${escapeHtml(deadline)}</div>
          <a class="btn" href="${item.link}" target="_blank" rel="noopener noreferrer">공고 보기</a>
        </article>
      `;
    }

    function byMode(mode, items, todayItems) {
      if (mode === 'today') return todayItems;
      if (mode === 'all') return items;
      return items.slice(0, 30);
    }

    function applyFilters(items, source, query) {
      const q = String(query || '').toLowerCase().trim();
      return items.filter((item) => {
        if (source !== 'all' && item.source !== source) return false;
        if (!q) return true;
        return String(item.title || '').toLowerCase().includes(q);
      });
    }

    async function init() {
      const updatedEl = document.getElementById('updated');
      const todayCountEl = document.getElementById('todayCount');
      const totalCountEl = document.getElementById('totalCount');
      const statusEl = document.getElementById('status');
      const listEl = document.getElementById('list');
      const resultHintEl = document.getElementById('resultHint');
      const modeRowEl = document.getElementById('modeRow');
      const sourceFilterEl = document.getElementById('sourceFilter');
      const searchInputEl = document.getElementById('searchInput');

      try {
        const data = await load();

        updatedEl.textContent = `마지막 갱신: ${toLocalText(data.generatedAt)}`;
        todayCountEl.textContent = `오늘 ${data?.counts?.today ?? 0}건`;
        totalCountEl.textContent = `전체 ${data?.counts?.total ?? 0}건`;

        const items = Array.isArray(data.items) ? data.items : [];
        const todayItems = Array.isArray(data.todayItems) ? data.todayItems : [];
        if (items.length === 0) {
          statusEl.textContent = '아직 수집된 데이터가 없습니다.';
          return;
        }

        const state = {
          mode: todayItems.length > 0 ? 'today' : 'recent',
          source: 'all',
          query: ''
        };

        function render() {
          const modeBase = byMode(state.mode, items, todayItems);
          const filtered = applyFilters(modeBase, state.source, state.query);

          if (state.mode === 'today') {
            statusEl.textContent = `오늘 올라온 공고 ${todayItems.length}건 기준으로 보여드립니다.`;
          } else if (state.mode === 'recent') {
            statusEl.textContent = '최근 공고 30건을 기본으로 보여드립니다.';
          } else {
            statusEl.textContent = '수집된 전체 공고를 보여드립니다.';
          }

          resultHintEl.textContent = `현재 표시: ${filtered.length}건`;

          if (filtered.length === 0) {
            listEl.innerHTML = '';
            resultHintEl.textContent = '조건에 맞는 결과가 없습니다.';
            return;
          }

          listEl.innerHTML = filtered.map(makeCard).join('');
        }

        function syncModeButtons() {
          modeRowEl.querySelectorAll('.mode-btn').forEach((btn) => {
            btn.classList.toggle('active', btn.dataset.mode === state.mode);
          });
        }

        modeRowEl.addEventListener('click', (e) => {
          const btn = e.target.closest('.mode-btn');
          if (!btn) return;
          state.mode = btn.dataset.mode;
          syncModeButtons();
          render();
        });

        sourceFilterEl.addEventListener('change', () => {
          state.source = sourceFilterEl.value;
          render();
        });

        searchInputEl.addEventListener('input', () => {
          state.query = searchInputEl.value;
          render();
        });

        syncModeButtons();
        render();
      } catch (err) {
        updatedEl.textContent = '데이터를 불러오지 못했습니다.';
        statusEl.textContent = err.message;
      }
    }

    init();
  </script>
</body>
</html>
