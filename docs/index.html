<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>공모전 데일리 보드</title>
  <link rel="icon" type="image/svg+xml" href="./favicon.svg" />
  <style>
    :root {
      --bg1: #f5f1e6;
      --bg2: #d9ead8;
      --ink: #1f2a24;
      --muted: #5a6b61;
      --card: #fffef9;
      --line: #cfd8cd;
      --accent: #2f7d57;
      --accent2: #1f5a3f;
      --chip-bg: #eef5ec;
      --warn: #9c5a19;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      color: var(--ink);
      font-family: "Noto Sans KR", "Malgun Gothic", sans-serif;
      background: radial-gradient(circle at 10% 10%, #fff7df 0%, transparent 40%),
                  radial-gradient(circle at 90% 20%, #d9f2dd 0%, transparent 35%),
                  linear-gradient(135deg, var(--bg1), var(--bg2));
      min-height: 100vh;
    }

    .wrap {
      width: min(1000px, 92vw);
      margin: 40px auto 60px;
    }

    .hero {
      padding: 24px;
      border: 1px solid var(--line);
      border-radius: 18px;
      background: rgba(255, 255, 255, 0.75);
      backdrop-filter: blur(4px);
      box-shadow: 0 8px 30px rgba(26, 47, 35, 0.08);
      animation: rise 0.6s ease;
    }

    h1 {
      margin: 0;
      font-size: clamp(24px, 3.3vw, 38px);
      letter-spacing: -0.02em;
    }

    .meta {
      margin-top: 8px;
      color: var(--muted);
      font-size: 14px;
    }

    .count {
      margin-top: 14px;
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    .source-summary {
      margin-top: 10px;
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .controls {
      margin-top: 16px;
      display: grid;
      gap: 10px;
      grid-template-columns: 1fr;
    }

    .filter-row {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      align-items: center;
    }

    .filter-input {
      border: 1px solid var(--line);
      border-radius: 10px;
      padding: 9px 10px;
      background: #fff;
      color: var(--ink);
      font-size: 13px;
      min-width: 220px;
      flex: 1;
    }

    .pill {
      border: 1px solid var(--line);
      border-radius: 999px;
      padding: 7px 12px;
      font-size: 14px;
      background: #fff;
    }

    .grid {
      margin-top: 24px;
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 14px;
    }

    .card {
      border: 1px solid var(--line);
      border-radius: 14px;
      background: var(--card);
      padding: 14px;
      display: grid;
      gap: 8px;
      transition: transform 0.2s ease, box-shadow 0.2s ease;
      opacity: 0;
      transform: translateY(8px);
      animation: rise 0.5s ease forwards;
    }

    .card:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(19, 54, 34, 0.12);
    }

    .source {
      display: inline-block;
      width: fit-content;
      font-size: 12px;
      color: #fff;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      border-radius: 999px;
      padding: 4px 9px;
    }

    .title {
      margin: 0;
      font-size: 16px;
      line-height: 1.45;
      overflow-wrap: anywhere;
      word-break: break-word;
    }

    .deadline {
      font-size: 13px;
      color: var(--muted);
    }

    .deadline.warn {
      color: var(--warn);
      font-weight: 600;
    }

    .field {
      font-size: 13px;
      color: var(--muted);
      background: var(--chip-bg);
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 6px 8px;
      overflow-wrap: anywhere;
      word-break: break-word;
    }

    a.btn {
      display: inline-block;
      width: fit-content;
      text-decoration: none;
      border: 1px solid var(--line);
      border-radius: 10px;
      padding: 8px 11px;
      color: var(--ink);
      background: #fff;
      font-size: 13px;
    }

    .pill {
      cursor: pointer;
    }

    .pill.active {
      background: var(--accent);
      color: #fff;
      border-color: var(--accent);
    }

    .empty {
      margin-top: 14px;
      color: var(--muted);
      font-size: 14px;
    }

    @keyframes rise {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @media (max-width: 640px) {
      .wrap { margin-top: 20px; }
      .hero { padding: 18px; }
    }
  </style>
</head>
<body>
  <main class="wrap">
    <section class="hero">
      <h1>공모전 데일리 보드</h1>
      <p class="meta" id="updated">업데이트 정보를 불러오는 중...</p>
      <div class="count">
        <span class="pill" id="todayCount">오늘 0건</span>
        <span class="pill" id="totalCount">전체 0건</span>
      </div>
      <div class="source-summary" id="sourceSummary"></div>
      <div class="controls">
        <div class="filter-row">
          <input class="filter-input" id="searchInput" type="text" placeholder="제목 검색 (예: 디자인, 서포터즈, 창업)" />
        </div>
      </div>
      <p class="empty" id="status"></p>
    </section>

    <section class="grid" id="list"></section>
  </main>

  <script>
    // GitHub Pages에서 생성된 최신 JSON 파일을 읽어 화면에 렌더링합니다.
    async function load() {
      // GitHub Pages 서브경로(.../contest-bot/)에서도 동작하도록 경로를 잡습니다.
      const basePath = window.location.pathname.includes('contest-bot') 
        ? '/contest-bot/data/latest.json' 
        : './data/latest.json';
      const res = await fetch(basePath, { cache: 'no-store' });
      if (!res.ok) throw new Error('latest.json 로드 실패');
      return res.json();
    }

    function toLocalText(iso) {
      if (!iso) return '-';
      const d = new Date(iso);
      return d.toLocaleString('ko-KR', { hour12: false });
    }

    function escapeHtml(text) {
      return String(text || '')
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#39;');
    }

    function sourceLabel(source) {
      if (source === 'wevity') return '위비티';
      if (source === 'thinkcontest') return '씽굿';
      if (source === 'campuspick') return '캠퍼스픽';
      return source || 'unknown';
    }

    function splitTitleAndField(rawTitle) {
      const text = String(rawTitle || '').replace(/\s+/g, ' ').trim();
      const parts = text.split(/\s*분야\s*[:：]\s*/);
      const main = parts[0].replace(/\s+SPECIAL(?:\s+IDEA)?\s*$/i, '').trim();
      const field = parts[1] ? parts[1].trim() : '';
      return { main, field };
    }

    function makeCard(item, idx) {
      const deadline = item.deadline || '-';
      const deadlineClass = deadline.includes('없음') ? 'deadline warn' : 'deadline';
      const parsed = splitTitleAndField(item.title);
      return `
        <article class="card" style="animation-delay:${Math.min(idx * 40, 500)}ms">
          <span class="source">${sourceLabel(item.source)}</span>
          <h3 class="title">${escapeHtml(parsed.main || item.title || '')}</h3>
          <div class="${deadlineClass}">기간: ${escapeHtml(deadline)}</div>
          <a class="btn" href="${item.link}" target="_blank" rel="noopener noreferrer">공고 보기</a>
        </article>
      `;
    }

    function applyFilters(items, query, source) {
      const q = String(query || '').toLowerCase().trim();
      return items.filter((item) => {
        if (source && source !== 'all' && item.source !== source) return false;
        if (!q) return true;
        return String(item.title || '').toLowerCase().includes(q);
      });
    }

    async function init() {
      const updatedEl = document.getElementById('updated');
      const todayCountEl = document.getElementById('todayCount');
      const totalCountEl = document.getElementById('totalCount');
      const statusEl = document.getElementById('status');
      const listEl = document.getElementById('list');
      const sourceSummaryEl = document.getElementById('sourceSummary');
      const searchInputEl = document.getElementById('searchInput');

      try {
        const data = await load();

        updatedEl.textContent = `마지막 갱신: ${toLocalText(data.generatedAt)}`;
        todayCountEl.textContent = `오늘 ${data?.counts?.today ?? 0}건`;
        totalCountEl.textContent = `전체 ${data?.counts?.total ?? 0}건`;

        const items = Array.isArray(data.items) ? data.items : [];
        const todayItems = Array.isArray(data.todayItems) ? data.todayItems : [];

        const sourceCounts = items.reduce((acc, item) => {
          const key = item.source || 'unknown';
          acc[key] = (acc[key] || 0) + 1;
          return acc;
        }, {});
        sourceSummaryEl.innerHTML = `
          <span class="pill">위비티 ${sourceCounts.wevity || 0}건</span>
          <span class="pill">씽굿 ${sourceCounts.thinkcontest || 0}건</span>
          <span class="pill">캠퍼스픽 ${sourceCounts.campuspick || 0}건</span>
        `;

        if (items.length === 0) {
          statusEl.textContent = '아직 수집된 데이터가 없습니다.';
          return;
        }

        const state = { query: '', view: 'today', source: 'all' }; // 'today' or 'all'

        function render() {
          let base;
          if (state.view === 'today') {
            base = todayItems.length > 0 ? todayItems : items.slice(0, 30);
            statusEl.textContent = todayItems.length > 0
              ? `오늘 올라온 공고 ${todayItems.length}건을 보여드립니다.`
              : '접수중 또는 접수예정 공고를 보여드립니다.';
          } else {
            base = items;
            statusEl.textContent = `전체 ${items.length}건을 보여드립니다.`;
          }
          
          const filtered = applyFilters(base, state.query, state.source);

          if (filtered.length === 0) {
            listEl.innerHTML = '';
            statusEl.textContent = '검색 조건에 맞는 공고가 없습니다.';
            return;
          }

          listEl.innerHTML = filtered.map(makeCard).join('');
        }

        todayCountEl.addEventListener('click', () => {
          state.view = 'today';
          todayCountEl.classList.add('active');
          totalCountEl.classList.remove('active');
          render();
        });

        totalCountEl.addEventListener('click', () => {
          state.view = 'all';
          totalCountEl.classList.add('active');
          todayCountEl.classList.remove('active');
          render();
        });

        searchInputEl.addEventListener('input', () => {
          state.query = searchInputEl.value;
          render();
        });

        // 소스 필터링 버튼 이벤트
        sourceSummaryEl.addEventListener('click', (e) => {
          if (e.target.classList.contains('pill')) {
            const text = e.target.textContent;
            let source = 'all';
            if (text.includes('위비티')) source = 'wevity';
            else if (text.includes('씽굿')) source = 'thinkcontest';
            else if (text.includes('캠퍼스픽')) source = 'campuspick';
            
            if (state.source === source) {
              state.source = 'all';
            } else {
              state.source = source;
            }
            
            Array.from(sourceSummaryEl.querySelectorAll('.pill')).forEach(pill => {
              pill.classList.remove('active');
            });
            if (state.source !== 'all') {
              e.target.classList.add('active');
            }
            render();
          }
        });

        // 초기 상태: 오늘 보기 강조
        todayCountEl.classList.add('active');
        render();
      } catch (err) {
        updatedEl.textContent = '데이터를 불러오지 못했습니다.';
        statusEl.textContent = err.message;
      }
    }

    init();
  </script>
</body>
</html>
