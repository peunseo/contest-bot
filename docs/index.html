<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>кіөлӘЁм „ лҚ°мқјлҰ¬ ліҙл“ң</title>
  <link rel="icon" type="image/svg+xml" href="./favicon.svg" />
  <style>
    :root {
      --bg1: #f5f1e6;
      --bg2: #d9ead8;
      --ink: #1f2a24;
      --muted: #5a6b61;
      --card: #fffef9;
      --line: #cfd8cd;
      --accent: #2f7d57;
      --accent2: #1f5a3f;
      --chip-bg: #eef5ec;
      --warn: #9c5a19;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      color: var(--ink);
      font-family: "Noto Sans KR", "Malgun Gothic", sans-serif;
      background: radial-gradient(circle at 10% 10%, #fff7df 0%, transparent 40%),
                  radial-gradient(circle at 90% 20%, #d9f2dd 0%, transparent 35%),
                  linear-gradient(135deg, var(--bg1), var(--bg2));
      min-height: 100vh;
    }

    .wrap {
      width: min(1000px, 92vw);
      margin: 40px auto 60px;
    }

    .hero {
      position: relative;
      z-index: 5;
      padding: 24px;
      border: 1px solid var(--line);
      border-radius: 18px;
      background: rgba(255, 255, 255, 0.75);
      backdrop-filter: blur(4px);
      box-shadow: 0 8px 30px rgba(26, 47, 35, 0.08);
      animation: rise 0.6s ease;
    }

    h1 {
      margin: 0;
      font-size: clamp(24px, 3.3vw, 38px);
      letter-spacing: -0.02em;
    }

    .meta {
      margin-top: 8px;
      color: var(--muted);
      font-size: 14px;
    }

    .count {
      margin-top: 14px;
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    .source-summary {
      margin-top: 10px;
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .controls {
      margin-top: 16px;
      display: grid;
      gap: 10px;
      grid-template-columns: 1fr;
    }

    .controls-panel {
      border: none;
      border-radius: 0;
      padding: 0;
      background: transparent;
    }

    .filter-row {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
      align-items: center;
      width: 100%;
    }

    .search-wrap {
      display: flex;
      align-items: center;
      flex: 1;
      min-width: 220px;
    }

    .search-icon {
      font-size: 12px;
      color: var(--muted);
      white-space: nowrap;
    }

    .external-btn {
      text-decoration: none;
      border: 1px solid var(--line);
      border-radius: 10px;
      padding: 9px 12px;
      background: #fff;
      color: var(--ink);
      font-size: 13px;
      transition: background-color 0.2s ease, border-color 0.2s ease;
      white-space: nowrap;
    }

    .external-btn:hover {
      background: #f3f6f2;
      border-color: #b7c8b8;
    }

    .site-dropdown {
      position: relative;
      min-width: 0;
      width: fit-content;
      margin-left: auto;
    }

    .site-dropdown summary {
      list-style: none;
      border: 1px solid var(--line);
      border-radius: 10px;
      padding: 7px 9px;
      background: #fff;
      color: var(--ink);
      font-size: 12px;
      cursor: pointer;
      user-select: none;
      white-space: nowrap;
      line-height: 1.2;
    }

    .site-dropdown summary::-webkit-details-marker {
      display: none;
    }

    .site-dropdown[open] summary {
      border-color: #b7c8b8;
      background: #f7faf6;
    }

    .site-dropdown-menu {
      position: absolute;
      top: calc(100% + 6px);
      left: 0;
      min-width: 112px;
      width: max-content;
      border: 1px solid var(--line);
      border-radius: 10px;
      background: #fff;
      box-shadow: 0 8px 18px rgba(20, 40, 28, 0.08);
      overflow: hidden;
      z-index: 20;
    }

    .site-dropdown-menu a {
      display: block;
      padding: 7px 9px;
      text-decoration: none;
      color: var(--ink);
      font-size: 12px;
      border-top: 1px solid #eef2ec;
      line-height: 1.2;
    }

    .site-dropdown-menu a:first-child {
      border-top: none;
    }

    .site-dropdown-menu a:hover {
      background: #f3f7f2;
    }

    .filter-input {
      border: 1px solid var(--line);
      border-radius: 10px;
      padding: 7px 9px;
      background: #fff;
      color: var(--ink);
      font-size: 12px;
      flex: 1;
      min-width: 0;
    }

    .filter-input:focus {
      outline: none;
      border-color: #b7c8b8;
      background: #f7faf6;
    }

    .control-btn {
      border: 1px solid var(--line);
      border-radius: 10px;
      padding: 9px 10px;
      background: #fff;
      color: var(--ink);
      font-size: 13px;
      cursor: pointer;
      white-space: nowrap;
    }

    .control-btn:hover {
      background: #f1f7f2;
      border-color: #b7c8b8;
    }

    .sort-lock {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      border: 1px dashed #b7c8b8;
      border-radius: 999px;
      padding: 6px 10px;
      background: #f4faf4;
      color: #355b45;
      font-size: 12px;
    }

    .field-chips {
      margin-top: 6px;
      display: flex;
      gap: 6px;
      flex-wrap: nowrap;
      overflow: visible;
      padding-bottom: 2px;
      position: relative;
      z-index: 2;
    }

    .field-chips .pill {
      white-space: nowrap;
      flex: 0 0 auto;
      padding: 5px 9px;
      font-size: 12px;
    }

    .pill {
      border: 1px solid var(--line);
      border-radius: 999px;
      padding: 7px 12px;
      font-size: 14px;
      background: #fff;
      transition: transform 0.15s ease, background-color 0.2s ease, border-color 0.2s ease;
    }

    .pill:hover {
      transform: translateY(-1px);
      border-color: #b7c8b8;
    }

    .grid {
      margin-top: 24px;
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 14px;
    }

    .pager {
      margin-top: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      flex-wrap: wrap;
    }

    .pager-btn {
      border: 1px solid var(--line);
      border-radius: 10px;
      padding: 7px 11px;
      background: #fff;
      color: var(--ink);
      font-size: 13px;
      cursor: pointer;
    }

    .pager-btn:disabled {
      opacity: 0.5;
      cursor: default;
    }

    .pager-info {
      font-size: 13px;
      color: var(--muted);
      min-width: 88px;
      text-align: center;
    }

    .card {
      border: 1px solid var(--line);
      border-radius: 14px;
      background: linear-gradient(135deg, var(--card) 0%, #fafbf9 100%);
      padding: 14px;
      display: flex;
      flex-direction: column;
      gap: 8px;
      min-height: 178px;
      transition: transform 0.2s ease, box-shadow 0.2s ease, background 0.2s ease;
      opacity: 0;
      transform: translateY(8px);
      animation: rise 0.5s ease forwards;
      position: relative;
      overflow: visible;
    }

    .card:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 24px rgba(19, 54, 34, 0.15);
      background: linear-gradient(135deg, var(--card) 0%, #f5faf4 100%);
    }

    .card.closed {
      background: #f1f1f1;
      border-color: #c9c9c9;
      color: #707070;
    }

    .card.closed .source {
      background: linear-gradient(135deg, #9a9a9a, #7f7f7f);
    }

    .card.closed .title,
    .card.closed .deadline,
    .card.closed .field {
      color: #707070;
    }

    .source {
      display: inline-block;
      width: fit-content;
      font-size: 12px;
      color: #fff;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      border-radius: 999px;
      padding: 4px 9px;
    }

    .topline {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      min-height: 24px;
    }

    .dday-chip {
      border-radius: 999px;
      padding: 4px 10px;
      font-size: 12px;
      font-weight: 700;
      border: 1px solid #f0c36a;
      background: #fff2cf;
      color: #7c5a18;
      white-space: nowrap;
    }

    .dday-chip.urgent {
      border-color: #e79d55;
      background: #ffe8cf;
      color: #8a3f08;
      box-shadow: 0 0 0 2px rgba(231, 157, 85, 0.15);
    }

    .dday-chip.closed {
      border-color: #b8b8b8;
      background: #ececec;
      color: #6d6d6d;
      box-shadow: none;
    }

    .badge-new {
      display: inline-block;
      background: linear-gradient(135deg, #4a90e2, #357abd);
      color: #fff;
      border: none;
      border-radius: 12px;
      padding: 4px 10px;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.5px;
      white-space: nowrap;
      box-shadow: 0 2px 8px rgba(74, 144, 226, 0.25);
    }

    .badge-hot {
      display: inline-block;
      background: linear-gradient(135deg, #e74c3c, #c0392b);
      color: #fff;
      border: none;
      border-radius: 12px;
      padding: 4px 10px;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.5px;
      white-space: nowrap;
      box-shadow: 0 2px 8px rgba(231, 76, 60, 0.25);
    }

    .title {
      margin: 0;
      font-size: 16px;
      line-height: 1.45;
      overflow-wrap: anywhere;
      word-break: break-word;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
      min-height: 48px;
    }

    .deadline {
      font-size: 13px;
      color: var(--muted);
      min-height: 18px;
      transition: color 0.2s ease;
    }

    .deadline.warn {
      color: #c0392b;
      font-weight: 700;
      text-shadow: 0 0 1px rgba(192, 57, 43, 0.2);
    }

    .deadline.closed {
      color: #7a7a7a;
      font-weight: 700;
    }

    .field {
      display: none;
    }

    .meta-row {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-top: auto;
      align-items: flex-end;
    }

    .meta-chip {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      border-radius: 999px;
      padding: 5px 10px;
      font-size: 12px;
      line-height: 1;
      border: 1px solid var(--line);
      background: #f8fbf7;
      color: #365342;
      white-space: nowrap;
      flex: 1;
      min-width: 0;
    }

    a.btn {
      display: block;
      text-decoration: none;
      border: 1px solid #d0e1d3;
      border-radius: 8px;
      padding: 8px 10px;
      color: var(--ink);
      background: linear-gradient(135deg, #eef6ef, #e6f2e8);
      font-size: 12px;
      transition: background 0.2s ease, color 0.2s ease, border-color 0.2s ease, box-shadow 0.2s ease;
      text-align: center;
      width: 100%;
      margin-top: auto;
      font-weight: 500;
    }

    a.btn:hover {
      background: linear-gradient(135deg, #e6f2e8, #dceae2);
      color: #1f5a3f;
      border-color: #2f7d57;
      box-shadow: 0 2px 8px rgba(47, 125, 87, 0.12);
    }

    .pill {
      cursor: pointer;
    }

    .pill.active {
      background: var(--accent);
      color: #fff;
      border-color: var(--accent);
    }

    .empty {
      margin-top: 6px;
      color: var(--muted);
      font-size: 14px;
      display: none;
    }

    @keyframes rise {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @media (max-width: 640px) {
      .wrap { margin-top: 20px; }
      .hero { padding: 18px; }
      .site-dropdown summary {
        padding: 6px 8px;
      }
      .field-chips {
        flex-wrap: wrap;
      }
      .controls-panel {
        padding: 9px;
      }
      .search-wrap {
        min-width: 0;
      }
    }
  </style>
</head>
<body>
  <main class="wrap">
    <section class="hero">
      <h1>кіөлӘЁм „ лҚ°мқјлҰ¬ ліҙл“ң</h1>
      <p class="meta"><span id="updated">м—…лҚ°мқҙнҠё м •ліҙлҘј л¶Ҳлҹ¬мҳӨлҠ” мӨ‘...</span></p>
      <div class="controls">
        <div class="controls-panel">
          <div class="filter-row">
            <div class="search-wrap">
              <input class="filter-input" id="searchInput" type="text" placeholder="м ңлӘ©/л¶„м•ј/мӮ¬мқҙнҠё кІҖмғү (мҳҲ: л””мһҗмқё, м„ңнҸ¬н„°мҰҲ, м°Ҫм—…)" />
            </div>
            <details class="site-dropdown">
              <summary>мӮ¬мқҙнҠё л°”лЎңк°Җкё°</summary>
              <div class="site-dropdown-menu">
                <a href="https://www.wevity.com/?c=find&s=1&gub=1" target="_blank" rel="noopener noreferrer">мң„л№„нӢ°</a>
                <a href="https://www.thinkcontest.com/thinkgood/user/contest/index.do" target="_blank" rel="noopener noreferrer">м”Ҫкөҝ</a>
                <a href="https://www.campuspick.com/contest" target="_blank" rel="noopener noreferrer">мә нҚјмҠӨн”Ҫ</a>
                <a href="https://linkareer.com/list/contest" target="_blank" rel="noopener noreferrer">л§Ғм»ӨлҰ¬м–ҙ</a>
              </div>
            </details>
          </div>
        </div>
      </div>
      <div class="field-chips" id="fieldChips"></div>
      <p class="empty" id="status"></p>
    </section>

    <section class="grid" id="list"></section>
    <div class="pager" id="pager">
      <button class="pager-btn" id="prevPage">мқҙм „</button>
      <span class="pager-info" id="pageInfo">1 / 1</span>
      <button class="pager-btn" id="nextPage">лӢӨмқҢ</button>
    </div>
  </main>

  <script>
    // мқҙ мҠӨнҒ¬лҰҪнҠёмқҳ нҒ° нқҗлҰ„(мӢ мһ… мҳЁліҙл”©мҡ©):
    // 1) load()к°Җ мөңмӢ  JSONмқ„ мқҪм–ҙмҳөлӢҲлӢӨ.
    // 2) init()мқҙ лҚ°мқҙн„° м „мІҳлҰ¬ + мғҒнғң(state) + мқҙлІӨнҠёлҘј мӨҖл№„н•©лӢҲлӢӨ.
    // 3) render()к°Җ нҳ„мһ¬ мғҒнғңлҘј кё°мӨҖмңјлЎң нҷ”л©ҙ HTMLмқ„ лӢӨмӢң к·ёлҰҪлӢҲлӢӨ.
    //
    // л””лІ„к№… мӢңмһ‘м җ м¶”мІң:
    // - нҷ”л©ҙмқҙ л№„м–ҙ мһҲмңјл©ҙ: load() м„ұкіө м—¬л¶ҖмҷҖ data.items кёёмқҙ нҷ•мқё
    // - нғӯ/н•„н„°к°Җ мқҙмғҒн•ҳл©ҙ: state к°’кіј render()мқҳ base/filtered нҷ•мқё
    // - м№ҙл“ң лӘЁм–‘мқҙ мқҙмғҒн•ҳл©ҙ: makeCard() м¶ңл Ҙ л¬ёмһҗм—ҙ нҷ•мқё

    // GitHub Pagesм—җ м ҖмһҘлҗң мөңмӢ  лҚ°мқҙн„°(JSON)лҘј л¶Ҳлҹ¬мҳөлӢҲлӢӨ.
    async function load() {
      // GitHub Pages м„ңлёҢкІҪлЎң(.../contest-bot/)м—җм„ңлҸ„ лҸҷмһ‘н•ҳлҸ„лЎқ кІҪлЎңлҘј мһЎмҠөлӢҲлӢӨ.
      const basePath = window.location.pathname.includes('contest-bot') 
        ? '/contest-bot/data/latest.json' 
        : './data/latest.json';
      // мәҗмӢңлҘј мҡ°нҡҢн•ҳкё° мң„н•ҙ мҝјлҰ¬мҠӨнҠёл§Ғмқ„ л¶ҷм—¬ н•ӯмғҒ мөңмӢ  нҢҢмқјмқ„ лӢӨмӢң мҡ”мІӯн•©лӢҲлӢӨ.
      const freshPath = `${basePath}?t=${Date.now()}`;
      const res = await fetch(freshPath, { cache: 'no-store' });
      if (!res.ok) throw new Error('latest.json лЎңл“ң мӢӨнҢЁ');
      return res.json();
    }

    // UTC мӢңк°„мқ„ лёҢлқјмҡ°м Җмқҳ н•ңкөӯм–ҙ лЎңм»¬ мӢңк°„ л¬ёмһҗм—ҙлЎң л°”кҝ” ліҙм—¬мӨҚлӢҲлӢӨ.
    function toLocalText(iso) {
      if (!iso) return '-';
      const d = new Date(iso);
      return d.toLocaleString('ko-KR', { hour12: false });
    }

    // м ңлӘ©/н…ҚмҠӨнҠём—җ нҸ¬н•Ёлҗ  мҲҳ мһҲлҠ” HTML нҠ№мҲҳл¬ёмһҗлҘј м•Ҳм „н•ҳкІҢ м№ҳнҷҳн•©лӢҲлӢӨ.
    function escapeHtml(text) {
      return String(text || '')
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#39;');
    }

    // мҶҢмҠӨ мҪ”л“ңк°’(wevity л“ұ)мқ„ нҷ”л©ҙм—җ ліҙм—¬мӨ„ н•ңкёҖ мқҙлҰ„мңјлЎң ліҖнҷҳн•©лӢҲлӢӨ.
    function sourceLabel(source) {
      if (source === 'wevity') return 'мң„л№„нӢ°';
      if (source === 'thinkcontest') return 'м”Ҫкөҝ';
      if (source === 'campuspick') return 'мә нҚјмҠӨн”Ҫ';
      if (source === 'linkareer') return 'л§Ғм»ӨлҰ¬м–ҙ';
      return source || 'unknown';
    }

    // л№„м–ҙ мһҲлҠ” fieldлҘј м ңлӘ© нӮӨмӣҢл“ңлЎң ліҙк°•н•ҙ л¶„м•ј н•„н„°к°Җ лҸҷмһ‘н•ҳлҸ„лЎқ н•©лӢҲлӢӨ.
    function inferFieldFromTitle(title) {
      const t = String(title || '').toLowerCase();
      if (!t) return 'кё°нғҖ';
      if (/л””мһҗмқё|лёҢлһңл“ң|кҙ‘кі |нҸ¬мҠӨн„°|мҳҒмғҒ|мӮ¬м§„|мӣ№нҲ°|мәҗлҰӯн„°/.test(t)) return 'л””мһҗмқё/мҪҳн…җмё ';
      if (/к°ңл°ң|мҪ”л”©|sw|it|ai|лҚ°мқҙн„°|н•ҙм»ӨнҶӨ|м•ұ|мӣ№/.test(t)) return 'IT/к°ңл°ң';
      if (/м°Ҫм—…|л№„мҰҲлӢҲмҠӨ|мӮ¬м—…|мҠӨнғҖнҠём—…|л§ҲмјҖнҢ…|кё°нҡҚ/.test(t)) return 'м°Ҫм—…/кё°нҡҚ';
      if (/л¬ён•ҷ|кёҖ|м—җм„ёмқҙ|мӢң|мҶҢм„Ө|лҸ…нӣ„к°җ|мһ‘л¬ё/.test(t)) return 'л¬ён•ҷ/кёҖм“°кё°';
      if (/м„ңнҸ¬н„°мҰҲ|кё°мһҗлӢЁ|нҷҚліҙлӢЁ|мІҙн—ҳлӢЁ|лҢҖмҷёнҷңлҸҷ/.test(t)) return 'лҢҖмҷёнҷңлҸҷ';
      if (/мқҢм•…|м¶Ө|кіөм—°|м—°кё°|лҜёмҲ |мҳҲмҲ /.test(t)) return 'мҳҲмҲ /кіөм—°';
      if (/нҷҳкІҪ|кё°нӣ„|нғ„мҶҢ|м—җл„Ҳм§Җ|м§ҖмҶҚк°ҖлҠҘ/.test(t)) return 'нҷҳкІҪ/мӮ¬нҡҢ';
      return 'кё°нғҖ';
    }

    // м ңлӘ© л¬ёмһҗм—ҙм—җм„ң л¶Җк°Җ нғңк·ёлҘј м •лҰ¬н•ҙ л©”мқё м ңлӘ©/л¶„м•ј н…ҚмҠӨнҠёлЎң л¶„лҰ¬н•©лӢҲлӢӨ.
    function splitTitleAndField(rawTitle) {
      const text = String(rawTitle || '').replace(/\s+/g, ' ').trim();
      const parts = text.split(/\s*л¶„м•ј\s*[:пјҡ]\s*/);
      const main = parts[0].replace(/\s+SPECIAL(?:\s+IDEA)?\s*$/i, '').trim();
      const field = parts[1] ? parts[1].trim() : '';
      return { main, field };
    }

    // YYYY-MM-DD л¬ёмһҗм—ҙмқ„ Date к°қмІҙлЎң ліҖнҷҳн•©лӢҲлӢӨ.
    function parseDate(dateText) {
      if (!dateText) return null;
      const m = String(dateText).trim().match(/^(\d{4})-(\d{2})-(\d{2})$/);
      if (!m) return null;
      return new Date(Number(m[1]), Number(m[2]) - 1, Number(m[3]));
    }

    // л§Ҳк°җмқјк№Ңм§Җ лӮЁмқҖ мқјмҲҳ(D-day кі„мӮ°мҡ©)лҘј л°ҳнҷҳн•©лӢҲлӢӨ.
    function getDaysLeft(endDateText) {
      const end = parseDate(endDateText);
      if (!end) return null;
      const now = new Date();
      const today = new Date(now.getFullYear(), now.getMonth(), now.getDate());
      const ms = end.getTime() - today.getTime();
      return Math.floor(ms / (24 * 60 * 60 * 1000));
    }

    // м•„мқҙн…ңмқҳ л§Ҳк°җмқјмқ„ мӮ¬лһҢмқҙ мқҪкё° мү¬мҡҙ л¬ёкө¬лЎң л§Ңл“ӯлӢҲлӢӨ.
    function toPeriod(item) {
      const end = item.endDate || '';
      if (end) return end;
      return item.deadline || 'л§Ҳк°җмқј лҜём •';
    }

    // D-day лұғм§Җм—җ н‘ңмӢңн•  н…ҚмҠӨнҠё(D-3, D-Day, л§Ҳк°җ)лҘј мғқм„ұн•©лӢҲлӢӨ.
    function toBadge(item) {
      const dday = Number.isInteger(item.dday) ? item.dday : getDaysLeft(item.endDate);
      if (dday === null || Number.isNaN(dday)) return '';
      if (dday < 0) return 'л§Ҳк°җ';
      if (dday === 0) return 'D-Day';
      return `D-${dday}`;
    }

    // D-day мғҒнғңм—җ л”°лқј лұғм§Җ мҠӨнғҖмқј нҒҙлһҳмҠӨлҘј кІ°м •н•©лӢҲлӢӨ.
    function badgeClass(item) {
      if (isClosed(item)) return 'dday-chip closed';
      if (isUrgent(item)) return 'dday-chip urgent';
      return 'dday-chip';
    }

    // кіөкі к°Җ л§Ҳк°җлҗҳм—ҲлҠ”м§Җ м—¬л¶ҖлҘј кі„мӮ°н•©лӢҲлӢӨ.
    function isClosed(item) {
      if (typeof item.isClosed === 'boolean') return item.isClosed;
      const dday = Number.isInteger(item.dday) ? item.dday : getDaysLeft(item.endDate);
      return Number.isInteger(dday) ? dday < 0 : false;
    }

    // л§Ҳк°җ 7мқј мқҙлӮҙ кіөкі мқём§Җ м—¬л¶ҖлҘј кі„мӮ°н•©лӢҲлӢӨ.
    function isUrgent(item) {
      if (typeof item.isUrgent === 'boolean') return item.isUrgent;
      const dday = Number.isInteger(item.dday) ? item.dday : getDaysLeft(item.endDate);
      return Number.isInteger(dday) ? dday >= 0 && dday <= 7 : false;
    }

    // мөңк·јм—җ мҳ¬лқјмҳЁ кіөкі (мҳӨлҠҳ лҳҗлҠ” м–ҙм ң)мқём§Җ нҢҗлӢЁн•©лӢҲлӢӨ.
    function isNew(item) {
      const today = new Date();
      const todayStr = `${today.getFullYear()}.${String(today.getMonth() + 1).padStart(2, '0')}.${String(today.getDate()).padStart(2, '0')}`;
      const yesterday = new Date(today.getTime() - 24 * 60 * 60 * 1000);
      const yesterdayStr = `${yesterday.getFullYear()}.${String(yesterday.getMonth() + 1).padStart(2, '0')}.${String(yesterday.getDate()).padStart(2, '0')}`;
      return item.uploadDate === todayStr || item.uploadDate === yesterdayStr;
    }

    // мқёкё°к°Җ л§ҺмқҖ кіөкі (HOT)мқём§Җ нҢҗлӢЁн•©лӢҲлӢӨ.
    function isHot(item) {
      const title = String(item.title || '').toLowerCase();
      const field = String(item.field || '').toLowerCase();
      // м„ңнҸ¬н„°мҰҲ, кё°мһҗлӢЁ, нҷҚліҙлӢЁ к°ҷмқҖ мқёкё° нӮӨмӣҢл“ңк°Җ мһҲмңјл©ҙ HOT н‘ңмӢң
      return /м„ңнҸ¬н„°мҰҲ|кё°мһҗлӢЁ|нҷҚліҙлӢЁ|мІҙн—ҳлӢЁ|м•°лІ„м„ңлҚ”/.test(title + field);
    }

    // л¶„м•јлі„ мғүмғҒ нҒҙлһҳмҠӨлҘј л°ҳнҷҳн•©лӢҲлӢӨ.
    function getFieldColorClass(field) {
      return 'etc';
    }

    // лӮ м§ң л¬ёмһҗм—ҙмқ„ м •л ¬ к°ҖлҠҘн•ң мҲ«мһҗ(timestamp)лЎң л°”кҝүлӢҲлӢӨ.
    function toDateValue(dateText) {
      const d = parseDate(dateText);
      return d ? d.getTime() : 0;
    }

    // м „мІҙ кіөкі лҘј мөңмӢ мҲңмңјлЎң м •л ¬н•©лӢҲлӢӨ.
    function sortLatestItems(arr) {
      return [...arr].sort((a, b) => {
        const aTs = toDateValue((a.uploadDate || '').replace(/\./g, '-')) || toDateValue(a.startDate) || toDateValue(a.endDate);
        const bTs = toDateValue((b.uploadDate || '').replace(/\./g, '-')) || toDateValue(b.startDate) || toDateValue(b.endDate);
        if (bTs !== aTs) return bTs - aTs;
        return String(a.title || '').localeCompare(String(b.title || ''), 'ko');
      });
    }

    // л§Ҳк°җмһ„л°• кіөкі лҘј лӮЁмқҖ кё°к°„(D-day) лӮҙлҰјм°ЁмҲңмңјлЎң м •л ¬н•©лӢҲлӢӨ.
    function sortUrgentItems(arr) {
      return [...arr].sort((a, b) => {
        const ad = Number.isInteger(a.dday) ? a.dday : getDaysLeft(a.endDate);
        const bd = Number.isInteger(b.dday) ? b.dday : getDaysLeft(b.endDate);
        // D-7(7) -> D-Day(0) мҲңм„ңлЎң кі м •н•©лӢҲлӢӨ.
        const aVal = Number.isInteger(ad) && ad >= 0 && ad <= 7 ? ad : 999;
        const bVal = Number.isInteger(bd) && bd >= 0 && bd <= 7 ? bd : 999;
        if (aVal !== bVal) return bVal - aVal;
        return toDateValue(a.endDate) - toDateValue(b.endDate);
      });
    }

    // кіөкі  1кұҙмқ„ м№ҙл“ң HTML л¬ёмһҗм—ҙлЎң л ҢлҚ”л§Ғн•©лӢҲлӢӨ.
    function makeCard(item, idx) {
      const period = toPeriod(item);
      const closed = isClosed(item);
      const ddayText = toBadge(item);
      const deadlineClass = closed ? 'deadline closed' : (period.includes('лҜём •') ? 'deadline warn' : 'deadline');
      const ddayHtml = ddayText ? `<span class="${badgeClass(item)}">${escapeHtml(ddayText)}</span>` : '';
      const parsed = splitTitleAndField(item.title);
      
      // NEW/HOT л°°м§Җ мғқм„ұ
      let badgeHtml = '';
      if (isNew(item) && !closed) {
        badgeHtml += '<span class="badge-new">NEW</span> ';
      }
      if (isHot(item)) {
        badgeHtml += '<span class="badge-hot">HOT</span>';
      }
      
      return `
        <article class="card ${closed ? 'closed' : ''}" style="animation-delay:${Math.min(idx * 40, 500)}ms">
          <div class="topline">
            <span class="source">${sourceLabel(item.source)}</span>
            ${ddayHtml}
          </div>
          <h3 class="title">${escapeHtml(parsed.main || item.title || '')}</h3>
          ${badgeHtml ? `<div style="font-size: 12px; margin: -2px 0 4px 0;">${badgeHtml}</div>` : ''}
          <div class="${deadlineClass}">л§Ҳк°җ: ${escapeHtml(period)}</div>
          <a class="btn" href="${item.link}" target="_blank" rel="noopener noreferrer">кіөкі  ліҙкё°</a>
        </article>
      `;
    }

    // кІҖмғүм–ҙ/мӮ¬мқҙнҠё н•„н„° мЎ°кұҙм—җ л§һлҠ” кіөкі л§Ң лӮЁк№ҒлӢҲлӢӨ.
    function applyFilters(items, query, source, field) {
      const q = String(query || '').toLowerCase().trim();
      return items.filter((item) => {
        if (source && source !== 'all' && item.source !== source) return false;
        if (field && field !== 'all' && (item.field || inferFieldFromTitle(item.title)) !== field) return false;
        if (!q) return true;

        const fieldText = String(item.field || inferFieldFromTitle(item.title) || '').toLowerCase();
        const sourceText = String(sourceLabel(item.source) || '').toLowerCase();
        const titleText = String(item.title || '').toLowerCase();
        return titleText.includes(q) || fieldText.includes(q) || sourceText.includes(q);
      });
    }

    // нҺҳмқҙм§Җ мҙҲкё° лҚ°мқҙн„° лЎңл“ң, мқҙлІӨнҠё м—°кІ°, мІ« нҷ”л©ҙ л ҢлҚ”л§Ғмқ„ мҲҳн–үн•©лӢҲлӢӨ.
    async function init() {
      const updatedEl = document.getElementById('updated');
      const listEl = document.getElementById('list');
      const pagerEl = document.getElementById('pager');
      const prevPageEl = document.getElementById('prevPage');
      const nextPageEl = document.getElementById('nextPage');
      const pageInfoEl = document.getElementById('pageInfo');
      const statusEl = document.getElementById('status');
      const fieldChipsEl = document.getElementById('fieldChips');
      const searchInputEl = document.getElementById('searchInput');
      const siteDropdownEl = document.querySelector('.site-dropdown');

      try {
        const data = await load();

        const refreshedAt = new Date().toISOString();
        updatedEl.textContent = `л§Ҳм§Җл§ү к°ұмӢ : ${toLocalText(refreshedAt)}`;

        const normalizedItems = (Array.isArray(data.items) ? data.items : []).map((item) => {
          const parsed = splitTitleAndField(item.title || '');
          const field = item.field || parsed.field || inferFieldFromTitle(parsed.main || item.title || '');
          return {
            ...item,
            field
          };
        });
        const items = normalizedItems.filter((item) => !isClosed(item));
        const allSortedItems = sortLatestItems(items);
        const todayFromData = Array.isArray(data.todayItems) ? data.todayItems : [];
        const todayItems = todayFromData.length > 0
          ? todayFromData
          : allSortedItems.filter((item) => String(item.uploadDate || '') === String(data.today || ''));
        const urgentItems = sortUrgentItems(allSortedItems.filter((item) => isUrgent(item) && !isClosed(item)));

        // todayItems:
        // - мҡ°м„  м„ңлІ„к°Җ кі„мӮ°н•ң todayItemsлҘј мӮ¬мҡ©
        // - м—Ҷмңјл©ҙ uploadDate == today к·ңм№ҷмңјлЎң н”„лЎ нҠём—җм„ң нҸҙл°ұ кі„мӮ°
        // urgentItems:
        // - isUrgent && !isClosed мЎ°кұҙмңјлЎң л§Ҳк°җмһ„л°•л§Ң м¶”лҰҪлӢҲлӢӨ.

        if (items.length === 0) {
          listEl.innerHTML = '';
          return;
        }

        const state = { query: '', view: 'all', source: 'all', field: 'all', page: 1, perPage: 12 };

        const fieldSet = new Set(['all']);
        items.forEach((item) => {
          const f = String(item.field || '').trim();
          if (f) fieldSet.add(f);
        });
        const allFields = [...fieldSet];

        // state н•„л“ң м„ӨлӘ…:
        // - query: кІҖмғүм–ҙ
        // - view: нҳ„мһ¬ нғӯ(today/urgent/all)
        // - source: мӮ¬мқҙнҠё н•„н„°(all/wevity/thinkcontest/campuspick)
        // - page/perPage: нҺҳмқҙм§Җл„Өмқҙм…ҳ м ңм–ҙ

        function renderFieldChips(baseItems) {
          const counts = baseItems.reduce((acc, item) => {
            const key = String(item.field || inferFieldFromTitle(item.title || '')).trim() || 'кё°нғҖ';
            acc[key] = (acc[key] || 0) + 1;
            return acc;
          }, {});

          // м№© кіјл°Җмқ„ мӨ„мқҙкё° мң„н•ҙ л…ём¶ң к°ҖлҠҘн•ң л¶„м•ј мӨ‘ мөңмҶҢ кұҙмҲҳ 1к°ңлҘј мҲЁк№ҒлӢҲлӢӨ.
          const onlyFields = allFields.filter((f) => f !== 'all' && (counts[f] || 0) > 0);
          const sortedByCountAsc = [...onlyFields].sort((a, b) => {
            const diff = (counts[a] || 0) - (counts[b] || 0);
            if (diff !== 0) return diff;
            return String(a).localeCompare(String(b), 'ko');
          });

          let hiddenField = '';
          if (sortedByCountAsc.length > 1) {
            hiddenField = sortedByCountAsc[0];
            if (hiddenField === state.field) hiddenField = sortedByCountAsc[1] || '';
          }

          const visibleFields = ['all', ...onlyFields.filter((f) => f !== hiddenField)];

          fieldChipsEl.innerHTML = visibleFields.map((f) => {
            const label = f === 'all' ? 'м „мІҙ л¶„м•ј' : f;
            const active = state.field === f ? 'active' : '';
            return `<span class="pill ${active}" data-field="${escapeHtml(f)}">${escapeHtml(label)}</span>`;
          }).join('');
        }

        // нҳ„мһ¬ мғҒнғң(нғӯ/кІҖмғү/мӮ¬мқҙнҠё/нҺҳмқҙм§Җ)м—җ л§һм¶° лӘ©лЎқкіј мғҒнғң л¬ёкө¬лҘј лӢӨмӢң к·ёлҰҪлӢҲлӢӨ.
        function render() {
          // нғӯ(view)м—җ л”°лқј кё°мӨҖ лӘ©лЎқмқ„ лЁјм Җ кі лҘҙкі ,
          // мқҙнӣ„ кІҖмғү/мӮ¬мқҙнҠё н•„н„°лҘј м Ғмҡ©н•ң лӢӨмқҢ,
          // л§Ҳм§Җл§үм—җ нҺҳмқҙм§Җ лӢЁмң„лЎң мһҳлқјм„ң м№ҙл“ң HTMLлЎң л ҢлҚ”л§Ғн•©лӢҲлӢӨ.
          // мқҙ н•ЁмҲҳлҠ” "мғҒнғңлҘј мқҪм–ҙ UIлҘј мһ¬мғқм„ұ"н•ҳлҠ” лӢЁмқј м§„мһ…м җмһ…лӢҲлӢӨ.
          // л”°лқјм„ң мғҒнғң ліҖкІҪмқҙ мһҲмңјл©ҙ н•ӯмғҒ render()лҘј лӢӨмӢң нҳём¶ңн•©лӢҲлӢӨ.
          // м „мІҙ лӘ©лЎқл§Ң н‘ңмӢң (view нғӯ м ңкұ°)
          const base = allSortedItems;

          renderFieldChips(base);

          const sortedBase = sortLatestItems(base);
          const filtered = applyFilters(sortedBase, state.query, 'all', state.field);
          const totalPages = Math.max(1, Math.ceil(filtered.length / state.perPage));
          if (state.page > totalPages) state.page = totalPages;
          const start = (state.page - 1) * state.perPage;
          const pageItems = filtered.slice(start, start + state.perPage);

          // нҺҳмқҙм§Җ кі„мӮ° к·ңм№ҷ:
          // - totalPagesлҠ” мөңмҶҢ 1лЎң мң м§Җн•ҙ л¶„кё° лӢЁмҲңнҷ”
          // - нҳ„мһ¬ нҺҳмқҙм§Җк°Җ лІ”мң„лҘј л„ҳмңјл©ҙ л§Ҳм§Җл§ү нҺҳмқҙм§ҖлЎң ліҙм •
          // - мӢӨм ң н‘ңмӢң лӘ©лЎқмқҖ slice(start, start + perPage)

          if (filtered.length === 0) {
            listEl.innerHTML = '';
            const hasSearchQuery = state.query.trim() !== '';
            if (hasSearchQuery) {
              statusEl.textContent = 'мЎ°кұҙм—җ л§һлҠ” кіөкі к°Җ м—ҶмҠөлӢҲлӢӨ.';
            } else {
              statusEl.textContent = 'кіөкі к°Җ м—ҶмҠөлӢҲлӢӨ.';
            }
            statusEl.style.display = 'block';
            pageInfoEl.textContent = '0 / 0';
            prevPageEl.disabled = true;
            nextPageEl.disabled = true;
            pagerEl.style.display = 'none';
            return;
          }

          pagerEl.style.display = 'flex';
          pageInfoEl.textContent = `${state.page} / ${totalPages}`;
          prevPageEl.disabled = state.page <= 1;
          nextPageEl.disabled = state.page >= totalPages;

          statusEl.textContent = '';
          statusEl.style.display = 'none';

          listEl.innerHTML = pageItems.map(makeCard).join('');
        }

        searchInputEl.oninput = () => {
          // кІҖмғүм–ҙк°Җ л°”лҖҢл©ҙ кІ°кіј кёёмқҙк°Җ лӢ¬лқјм§ҖлҜҖлЎң 1нҺҳмқҙм§Җл¶Җн„° лӢӨмӢң мӢңмһ‘н•©лӢҲлӢӨ.
          state.query = searchInputEl.value;
          state.page = 1;
          render();
        };

        fieldChipsEl.onclick = (e) => {
          if (!e.target.classList.contains('pill')) return;
          const selected = e.target.getAttribute('data-field') || 'all';
          state.field = state.field === selected ? 'all' : selected;
          state.page = 1;
          render();
        };

        prevPageEl.onclick = () => {
          if (state.page <= 1) return;
          state.page -= 1;
          render();
        };

        nextPageEl.onclick = () => {
          state.page += 1;
          render();
        };

        if (siteDropdownEl) {
          // л“ңлЎӯлӢӨмҡҙ UX к·ңм№ҷ:
          // - л°”к№Ҙ нҒҙлҰӯ мӢң лӢ«нһҳ
          // - ESC нӮӨ мһ…л Ҙ мӢң лӢ«нһҳ
          // - л©”лүҙ н•ӯлӘ© нҒҙлҰӯ нӣ„ мһҗлҸҷ лӢ«нһҳ
          document.addEventListener('click', (e) => {
            if (!siteDropdownEl.open) return;
            if (!siteDropdownEl.contains(e.target)) {
              siteDropdownEl.open = false;
            }
          });

          document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape' && siteDropdownEl.open) {
              siteDropdownEl.open = false;
            }
          });

          siteDropdownEl.querySelectorAll('a').forEach((a) => {
            a.addEventListener('click', () => {
              siteDropdownEl.open = false;
            });
          });
        }

        render();
      } catch (err) {
        updatedEl.textContent = `лҚ°мқҙн„°лҘј л¶Ҳлҹ¬мҳӨм§Җ лӘ»н–ҲмҠөлӢҲлӢӨ. (${err.message})`;
      }
    }

    init();
  </script>
