<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>공모전 데일리 보드</title>
  <link rel="icon" type="image/svg+xml" href="./favicon.svg" />
  <style>
    :root {
      --bg1: #f5f1e6;
      --bg2: #d9ead8;
      --ink: #1f2a24;
      --muted: #5a6b61;
      --card: #fffef9;
      --line: #cfd8cd;
      --accent: #2f7d57;
      --accent2: #1f5a3f;
      --chip-bg: #eef5ec;
      --warn: #9c5a19;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      color: var(--ink);
      font-family: "Noto Sans KR", "Malgun Gothic", sans-serif;
      background: radial-gradient(circle at 10% 10%, #fff7df 0%, transparent 40%),
                  radial-gradient(circle at 90% 20%, #d9f2dd 0%, transparent 35%),
                  linear-gradient(135deg, var(--bg1), var(--bg2));
      min-height: 100vh;
    }

    .wrap {
      width: min(1000px, 92vw);
      margin: 40px auto 60px;
    }

    .hero {
      position: relative;
      z-index: 5;
      padding: 24px;
      border: 1px solid var(--line);
      border-radius: 18px;
      background: rgba(255, 255, 255, 0.75);
      backdrop-filter: blur(4px);
      box-shadow: 0 8px 30px rgba(26, 47, 35, 0.08);
      animation: rise 0.6s ease;
    }

    h1 {
      margin: 0;
      font-size: clamp(24px, 3.3vw, 38px);
      letter-spacing: -0.02em;
    }

    .meta {
      margin-top: 8px;
      color: var(--muted);
      font-size: 14px;
    }

    .count {
      margin-top: 14px;
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    .source-summary {
      margin-top: 10px;
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .controls {
      margin-top: 16px;
      display: grid;
      gap: 10px;
      grid-template-columns: 1fr;
    }

    .filter-row {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
      align-items: center;
    }

    .external-btn {
      text-decoration: none;
      border: 1px solid var(--line);
      border-radius: 10px;
      padding: 9px 12px;
      background: #fff;
      color: var(--ink);
      font-size: 13px;
      transition: background-color 0.2s ease, border-color 0.2s ease;
      white-space: nowrap;
    }

    .external-btn:hover {
      background: #f3f6f2;
      border-color: #b7c8b8;
    }

    .site-dropdown {
      position: relative;
      min-width: 0;
      width: fit-content;
    }

    .site-dropdown summary {
      list-style: none;
      border: 1px solid var(--line);
      border-radius: 10px;
      padding: 7px 9px;
      background: #fff;
      color: var(--ink);
      font-size: 12px;
      cursor: pointer;
      user-select: none;
      white-space: nowrap;
      line-height: 1.2;
    }

    .site-dropdown summary::-webkit-details-marker {
      display: none;
    }

    .site-dropdown[open] summary {
      border-color: #b7c8b8;
      background: #f7faf6;
    }

    .site-dropdown-menu {
      position: absolute;
      top: calc(100% + 6px);
      left: 0;
      min-width: 112px;
      width: max-content;
      border: 1px solid var(--line);
      border-radius: 10px;
      background: #fff;
      box-shadow: 0 8px 18px rgba(20, 40, 28, 0.08);
      overflow: hidden;
      z-index: 20;
    }

    .site-dropdown-menu a {
      display: block;
      padding: 7px 9px;
      text-decoration: none;
      color: var(--ink);
      font-size: 12px;
      border-top: 1px solid #eef2ec;
      line-height: 1.2;
    }

    .site-dropdown-menu a:first-child {
      border-top: none;
    }

    .site-dropdown-menu a:hover {
      background: #f3f7f2;
    }

    .filter-input {
      border: 1px solid var(--line);
      border-radius: 10px;
      padding: 9px 10px;
      background: #fff;
      color: var(--ink);
      font-size: 13px;
      min-width: 220px;
      flex: 1;
    }

    .pill {
      border: 1px solid var(--line);
      border-radius: 999px;
      padding: 7px 12px;
      font-size: 14px;
      background: #fff;
    }

    .grid {
      margin-top: 24px;
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 14px;
    }

    .pager {
      margin-top: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      flex-wrap: wrap;
    }

    .pager-btn {
      border: 1px solid var(--line);
      border-radius: 10px;
      padding: 7px 11px;
      background: #fff;
      color: var(--ink);
      font-size: 13px;
      cursor: pointer;
    }

    .pager-btn:disabled {
      opacity: 0.5;
      cursor: default;
    }

    .pager-info {
      font-size: 13px;
      color: var(--muted);
      min-width: 88px;
      text-align: center;
    }

    .card {
      border: 1px solid var(--line);
      border-radius: 14px;
      background: var(--card);
      padding: 14px;
      display: flex;
      flex-direction: column;
      gap: 8px;
      min-height: 178px;
      transition: transform 0.2s ease, box-shadow 0.2s ease;
      opacity: 0;
      transform: translateY(8px);
      animation: rise 0.5s ease forwards;
    }

    .card:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(19, 54, 34, 0.12);
    }

    .card.closed {
      background: #f1f1f1;
      border-color: #c9c9c9;
      color: #707070;
    }

    .card.closed .source {
      background: linear-gradient(135deg, #9a9a9a, #7f7f7f);
    }

    .card.closed .title,
    .card.closed .deadline,
    .card.closed .field {
      color: #707070;
    }

    .source {
      display: inline-block;
      width: fit-content;
      font-size: 12px;
      color: #fff;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      border-radius: 999px;
      padding: 4px 9px;
    }

    .topline {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      min-height: 24px;
    }

    .dday-chip {
      border-radius: 999px;
      padding: 4px 10px;
      font-size: 12px;
      font-weight: 700;
      border: 1px solid #f0c36a;
      background: #fff2cf;
      color: #7c5a18;
      white-space: nowrap;
    }

    .dday-chip.urgent {
      border-color: #e79d55;
      background: #ffe8cf;
      color: #8a3f08;
      box-shadow: 0 0 0 2px rgba(231, 157, 85, 0.15);
    }

    .dday-chip.closed {
      border-color: #b8b8b8;
      background: #ececec;
      color: #6d6d6d;
      box-shadow: none;
    }

    .title {
      margin: 0;
      font-size: 16px;
      line-height: 1.45;
      overflow-wrap: anywhere;
      word-break: break-word;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
      min-height: 48px;
    }

    .deadline {
      font-size: 13px;
      color: var(--muted);
      min-height: 18px;
    }

    .deadline.warn {
      color: var(--warn);
      font-weight: 600;
    }

    .deadline.closed {
      color: #7a7a7a;
      font-weight: 700;
    }

    .field {
      font-size: 13px;
      color: var(--muted);
      background: var(--chip-bg);
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 6px 8px;
      overflow-wrap: anywhere;
      word-break: break-word;
    }

    a.btn {
      display: inline-block;
      width: fit-content;
      text-decoration: none;
      border: 1px solid var(--line);
      border-radius: 10px;
      padding: 8px 11px;
      color: var(--ink);
      background: #fff;
      font-size: 13px;
      transition: background-color 0.2s ease, color 0.2s ease, border-color 0.2s ease;
      margin-top: auto;
    }

    a.btn:hover {
      background: #eef6ef;
      color: #2a6246;
      border-color: #a7c3af;
    }

    .pill {
      cursor: pointer;
    }

    .pill.active {
      background: var(--accent);
      color: #fff;
      border-color: var(--accent);
    }

    .empty {
      margin-top: 14px;
      color: var(--muted);
      font-size: 14px;
    }

    @keyframes rise {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @media (max-width: 640px) {
      .wrap { margin-top: 20px; }
      .hero { padding: 18px; }
      .site-dropdown summary {
        padding: 6px 8px;
      }
    }
  </style>
</head>
<body>
  <main class="wrap">
    <section class="hero">
      <h1>공모전 데일리 보드</h1>
      <p class="meta"><span id="updated">업데이트 정보를 불러오는 중...</span></p>
      <div class="count">
        <span class="pill" id="totalCount">전체 0건</span>
        <span class="pill" id="urgentCount">마감임박 0건</span>
        <span class="pill" id="todayCount">오늘 0건</span>
      </div>
      <div class="source-summary" id="sourceSummary"></div>
      <div class="controls">
        <div class="filter-row">
          <input class="filter-input" id="searchInput" type="text" placeholder="제목 검색 (예: 디자인, 서포터즈, 창업)" />
          <details class="site-dropdown">
            <summary>사이트 바로가기</summary>
            <div class="site-dropdown-menu">
              <a href="https://www.wevity.com/?c=find&s=1&gub=1" target="_blank" rel="noopener noreferrer">위비티</a>
              <a href="https://www.thinkcontest.com/thinkgood/user/contest/index.do" target="_blank" rel="noopener noreferrer">씽굿</a>
              <a href="https://www.campuspick.com/contest" target="_blank" rel="noopener noreferrer">캠퍼스픽</a>
              <a href="https://linkareer.com/list/contest" target="_blank" rel="noopener noreferrer">링커리어</a>
            </div>
          </details>
        </div>
      </div>
      <p class="empty" id="status"></p>
    </section>

    <section class="grid" id="list"></section>
    <div class="pager" id="pager">
      <button class="pager-btn" id="prevPage">이전</button>
      <span class="pager-info" id="pageInfo">1 / 1</span>
      <button class="pager-btn" id="nextPage">다음</button>
    </div>
  </main>

  <script>
    // 이 스크립트의 큰 흐름(신입 온보딩용):
    // 1) load()가 최신 JSON을 읽어옵니다.
    // 2) init()이 데이터 전처리 + 상태(state) + 이벤트를 준비합니다.
    // 3) render()가 현재 상태를 기준으로 화면 HTML을 다시 그립니다.
    //
    // 디버깅 시작점 추천:
    // - 화면이 비어 있으면: load() 성공 여부와 data.items 길이 확인
    // - 탭/필터가 이상하면: state 값과 render()의 base/filtered 확인
    // - 카드 모양이 이상하면: makeCard() 출력 문자열 확인

    // GitHub Pages에 저장된 최신 데이터(JSON)를 불러옵니다.
    async function load() {
      // GitHub Pages 서브경로(.../contest-bot/)에서도 동작하도록 경로를 잡습니다.
      const basePath = window.location.pathname.includes('contest-bot') 
        ? '/contest-bot/data/latest.json' 
        : './data/latest.json';
      // 캐시를 우회하기 위해 쿼리스트링을 붙여 항상 최신 파일을 다시 요청합니다.
      const freshPath = `${basePath}?t=${Date.now()}`;
      const res = await fetch(freshPath, { cache: 'no-store' });
      if (!res.ok) throw new Error('latest.json 로드 실패');
      return res.json();
    }

    // UTC 시간을 브라우저의 한국어 로컬 시간 문자열로 바꿔 보여줍니다.
    function toLocalText(iso) {
      if (!iso) return '-';
      const d = new Date(iso);
      return d.toLocaleString('ko-KR', { hour12: false });
    }

    // 제목/텍스트에 포함될 수 있는 HTML 특수문자를 안전하게 치환합니다.
    function escapeHtml(text) {
      return String(text || '')
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#39;');
    }

    // 소스 코드값(wevity 등)을 화면에 보여줄 한글 이름으로 변환합니다.
    function sourceLabel(source) {
      if (source === 'wevity') return '위비티';
      if (source === 'thinkcontest') return '씽굿';
      if (source === 'campuspick') return '캠퍼스픽';
      return source || 'unknown';
    }

    // 제목 문자열에서 부가 태그를 정리해 메인 제목/분야 텍스트로 분리합니다.
    function splitTitleAndField(rawTitle) {
      const text = String(rawTitle || '').replace(/\s+/g, ' ').trim();
      const parts = text.split(/\s*분야\s*[:：]\s*/);
      const main = parts[0].replace(/\s+SPECIAL(?:\s+IDEA)?\s*$/i, '').trim();
      const field = parts[1] ? parts[1].trim() : '';
      return { main, field };
    }

    // YYYY-MM-DD 문자열을 Date 객체로 변환합니다.
    function parseDate(dateText) {
      if (!dateText) return null;
      const m = String(dateText).trim().match(/^(\d{4})-(\d{2})-(\d{2})$/);
      if (!m) return null;
      return new Date(Number(m[1]), Number(m[2]) - 1, Number(m[3]));
    }

    // 마감일까지 남은 일수(D-day 계산용)를 반환합니다.
    function getDaysLeft(endDateText) {
      const end = parseDate(endDateText);
      if (!end) return null;
      const now = new Date();
      const today = new Date(now.getFullYear(), now.getMonth(), now.getDate());
      const ms = end.getTime() - today.getTime();
      return Math.floor(ms / (24 * 60 * 60 * 1000));
    }

    // 아이템의 시작일/마감일을 사람이 읽기 쉬운 접수기간 문구로 만듭니다.
    function toPeriod(item) {
      const start = item.startDate || '';
      const end = item.endDate || '';

      if (start && end) return `${start} ~ ${end}`;
      if (!start && end) return `시작일 미정 ~ ${end}`;
      if (start && !end) return `${start} ~ 마감일 미정`;
      return item.deadline || '기간 정보 없음';
    }

    // D-day 뱃지에 표시할 텍스트(D-3, D-Day, 마감)를 생성합니다.
    function toBadge(item) {
      const dday = Number.isInteger(item.dday) ? item.dday : getDaysLeft(item.endDate);
      if (dday === null || Number.isNaN(dday)) return '';
      if (dday < 0) return '마감';
      if (dday === 0) return 'D-Day';
      return `D-${dday}`;
    }

    // D-day 상태에 따라 뱃지 스타일 클래스를 결정합니다.
    function badgeClass(item) {
      if (isClosed(item)) return 'dday-chip closed';
      if (isUrgent(item)) return 'dday-chip urgent';
      return 'dday-chip';
    }

    // 공고가 마감되었는지 여부를 계산합니다.
    function isClosed(item) {
      if (typeof item.isClosed === 'boolean') return item.isClosed;
      const dday = Number.isInteger(item.dday) ? item.dday : getDaysLeft(item.endDate);
      return Number.isInteger(dday) ? dday < 0 : false;
    }

    // 마감 7일 이내 공고인지 여부를 계산합니다.
    function isUrgent(item) {
      if (typeof item.isUrgent === 'boolean') return item.isUrgent;
      const dday = Number.isInteger(item.dday) ? item.dday : getDaysLeft(item.endDate);
      return Number.isInteger(dday) ? dday >= 0 && dday <= 7 : false;
    }

    // 날짜 문자열을 정렬 가능한 숫자(timestamp)로 바꿉니다.
    function toDateValue(dateText) {
      const d = parseDate(dateText);
      return d ? d.getTime() : 0;
    }

    // 전체 공고를 최신순으로 정렬합니다.
    function sortLatestItems(arr) {
      return [...arr].sort((a, b) => {
        const aTs = toDateValue((a.uploadDate || '').replace(/\./g, '-')) || toDateValue(a.startDate) || toDateValue(a.endDate);
        const bTs = toDateValue((b.uploadDate || '').replace(/\./g, '-')) || toDateValue(b.startDate) || toDateValue(b.endDate);
        if (bTs !== aTs) return bTs - aTs;
        return String(a.title || '').localeCompare(String(b.title || ''), 'ko');
      });
    }

    // 마감임박 공고를 D-day 오름차순(급한 순)으로 정렬합니다.
    function sortUrgentItems(arr) {
      return [...arr].sort((a, b) => {
        const ad = Number.isInteger(a.dday) ? a.dday : getDaysLeft(a.endDate);
        const bd = Number.isInteger(b.dday) ? b.dday : getDaysLeft(b.endDate);
        const aVal = Number.isInteger(ad) ? ad : 999;
        const bVal = Number.isInteger(bd) ? bd : 999;
        if (aVal !== bVal) return aVal - bVal;
        return toDateValue(a.endDate) - toDateValue(b.endDate);
      });
    }

    // 공고 1건을 카드 HTML 문자열로 렌더링합니다.
    function makeCard(item, idx) {
      const period = toPeriod(item);
      const closed = isClosed(item);
      const ddayText = toBadge(item);
      const deadlineClass = closed ? 'deadline closed' : (period.includes('없음') ? 'deadline warn' : 'deadline');
      const ddayHtml = ddayText ? `<span class="${badgeClass(item)}">${escapeHtml(ddayText)}</span>` : '';
      const parsed = splitTitleAndField(item.title);
      return `
        <article class="card ${closed ? 'closed' : ''}" style="animation-delay:${Math.min(idx * 40, 500)}ms">
          <div class="topline">
            <span class="source">${sourceLabel(item.source)}</span>
            ${ddayHtml}
          </div>
          <h3 class="title">${escapeHtml(parsed.main || item.title || '')}</h3>
          <div class="${deadlineClass}">접수: ${escapeHtml(period)}</div>
          <a class="btn" href="${item.link}" target="_blank" rel="noopener noreferrer">공고 보기</a>
        </article>
      `;
    }

    // 검색어/사이트 필터 조건에 맞는 공고만 남깁니다.
    function applyFilters(items, query, source) {
      const q = String(query || '').toLowerCase().trim();
      return items.filter((item) => {
        if (source && source !== 'all' && item.source !== source) return false;
        if (!q) return true;
        return String(item.title || '').toLowerCase().includes(q);
      });
    }

    // 페이지 초기 데이터 로드, 이벤트 연결, 첫 화면 렌더링을 수행합니다.
    async function init() {
      const updatedEl = document.getElementById('updated');
      const todayCountEl = document.getElementById('todayCount');
      const urgentCountEl = document.getElementById('urgentCount');
      const totalCountEl = document.getElementById('totalCount');
      const listEl = document.getElementById('list');
      const pagerEl = document.getElementById('pager');
      const prevPageEl = document.getElementById('prevPage');
      const nextPageEl = document.getElementById('nextPage');
      const pageInfoEl = document.getElementById('pageInfo');
      const statusEl = document.getElementById('status');
      const sourceSummaryEl = document.getElementById('sourceSummary');
      const searchInputEl = document.getElementById('searchInput');
      const siteDropdownEl = document.querySelector('.site-dropdown');

      try {
        const data = await load();

        const refreshedAt = new Date().toISOString();
        updatedEl.textContent = `마지막 갱신: ${toLocalText(refreshedAt)}`;
        todayCountEl.textContent = `오늘 ${data?.counts?.today ?? 0}건`;
        totalCountEl.textContent = `전체 ${data?.counts?.total ?? 0}건`;

        const items = Array.isArray(data.items) ? data.items : [];
        const allSortedItems = sortLatestItems(items);
        const todayFromData = Array.isArray(data.todayItems) ? data.todayItems : [];
        const todayItems = todayFromData.length > 0
          ? todayFromData
          : allSortedItems.filter((item) => String(item.uploadDate || '') === String(data.today || ''));
        const urgentItems = sortUrgentItems(allSortedItems.filter((item) => isUrgent(item) && !isClosed(item)));

        // todayItems:
        // - 우선 서버가 계산한 todayItems를 사용
        // - 없으면 uploadDate == today 규칙으로 프론트에서 폴백 계산
        // urgentItems:
        // - isUrgent && !isClosed 조건으로 마감임박만 추립니다.

        if (items.length === 0) {
          listEl.innerHTML = '';
          return;
        }

        const state = { query: '', view: 'all', source: 'all', page: 1, perPage: 12 };
        urgentCountEl.textContent = `마감임박 ${urgentItems.length}건`;

        // state 필드 설명:
        // - query: 검색어
        // - view: 현재 탭(today/urgent/all)
        // - source: 사이트 필터(all/wevity/thinkcontest/campuspick)
        // - page/perPage: 페이지네이션 제어

        // 현재 탭 기준으로 소스별 건수를 다시 계산해 칩에 표시합니다.
        function renderSourceSummary(baseItems) {
          const counts = baseItems.reduce((acc, item) => {
            const key = item.source || 'unknown';
            acc[key] = (acc[key] || 0) + 1;
            return acc;
          }, {});

          sourceSummaryEl.innerHTML = `
            <span class="pill ${state.source === 'wevity' ? 'active' : ''}">위비티 ${counts.wevity || 0}건</span>
            <span class="pill ${state.source === 'thinkcontest' ? 'active' : ''}">씽굿 ${counts.thinkcontest || 0}건</span>
            <span class="pill ${state.source === 'campuspick' ? 'active' : ''}">캠퍼스픽 ${counts.campuspick || 0}건</span>
          `;
        }

        // 현재 상태(탭/검색/사이트/페이지)에 맞춰 목록과 상태 문구를 다시 그립니다.
        function render() {
          // 탭(view)에 따라 기준 목록을 먼저 고르고,
          // 이후 검색/사이트 필터를 적용한 다음,
          // 마지막에 페이지 단위로 잘라서 카드 HTML로 렌더링합니다.
          // 이 함수는 "상태를 읽어 UI를 재생성"하는 단일 진입점입니다.
          // 따라서 상태 변경이 있으면 항상 render()를 다시 호출합니다.
          let base;
          if (state.view === 'today') {
            base = todayItems;
          } else if (state.view === 'urgent') {
            base = urgentItems;
          } else {
            base = allSortedItems;
          }

          renderSourceSummary(base);

          const filtered = applyFilters(base, state.query, state.source);
          const totalPages = Math.max(1, Math.ceil(filtered.length / state.perPage));
          if (state.page > totalPages) state.page = totalPages;
          const start = (state.page - 1) * state.perPage;
          const pageItems = filtered.slice(start, start + state.perPage);

          // 페이지 계산 규칙:
          // - totalPages는 최소 1로 유지해 분기 단순화
          // - 현재 페이지가 범위를 넘으면 마지막 페이지로 보정
          // - 실제 표시 목록은 slice(start, start + perPage)

          if (filtered.length === 0) {
            listEl.innerHTML = '';
            const hasSearchQuery = state.query.trim() !== '';
            if (hasSearchQuery) {
              statusEl.textContent = '조건에 맞는 공고가 없습니다.';
            } else if (state.view === 'today') {
              statusEl.textContent = '오늘의 공고가 없습니다.';
            } else if (state.view === 'urgent') {
              statusEl.textContent = '마감임박한 공고가 없습니다.';
            } else {
              statusEl.textContent = '공고가 없습니다.';
            }
            pageInfoEl.textContent = '0 / 0';
            prevPageEl.disabled = true;
            nextPageEl.disabled = true;
            pagerEl.style.display = 'none';
            return;
          }

          pagerEl.style.display = 'flex';
          pageInfoEl.textContent = `${state.page} / ${totalPages}`;
          prevPageEl.disabled = state.page <= 1;
          nextPageEl.disabled = state.page >= totalPages;

          statusEl.textContent = '';

          listEl.innerHTML = pageItems.map(makeCard).join('');
        }

        todayCountEl.onclick = () => {
          // 탭 전환 시 source를 all로 초기화해 "이전 사이트 고정" 혼란을 방지합니다.
          state.view = 'today';
          state.source = 'all';
          state.page = 1;
          todayCountEl.classList.add('active');
          urgentCountEl.classList.remove('active');
          totalCountEl.classList.remove('active');
          render();
        };

        urgentCountEl.onclick = () => {
          // 탭 전환 시 source를 all로 초기화해 "이전 사이트 고정" 혼란을 방지합니다.
          state.view = 'urgent';
          state.source = 'all';
          state.page = 1;
          urgentCountEl.classList.add('active');
          todayCountEl.classList.remove('active');
          totalCountEl.classList.remove('active');
          render();
        };

        totalCountEl.onclick = () => {
          // 탭 전환 시 source를 all로 초기화해 "이전 사이트 고정" 혼란을 방지합니다.
          state.view = 'all';
          state.source = 'all';
          state.page = 1;
          totalCountEl.classList.add('active');
          todayCountEl.classList.remove('active');
          urgentCountEl.classList.remove('active');
          render();
        };

        searchInputEl.oninput = () => {
          // 검색어가 바뀌면 결과 길이가 달라지므로 1페이지부터 다시 시작합니다.
          state.query = searchInputEl.value;
          state.page = 1;
          render();
        };

        sourceSummaryEl.onclick = (e) => {
          if (!e.target.classList.contains('pill')) return;
          // 칩 텍스트를 소스 코드값으로 변환합니다.
          const text = e.target.textContent;
          let source = 'all';
          if (text.includes('위비티')) source = 'wevity';
          else if (text.includes('씽굿')) source = 'thinkcontest';
          else if (text.includes('캠퍼스픽')) source = 'campuspick';

          state.source = state.source === source ? 'all' : source;
          // 사이트 필터 변경 시에도 목록 길이가 달라질 수 있어 1페이지로 이동합니다.
          state.page = 1;
          render();
        };

        prevPageEl.onclick = () => {
          if (state.page <= 1) return;
          state.page -= 1;
          render();
        };

        nextPageEl.onclick = () => {
          state.page += 1;
          render();
        };

        if (siteDropdownEl) {
          // 드롭다운 UX 규칙:
          // - 바깥 클릭 시 닫힘
          // - ESC 키 입력 시 닫힘
          // - 메뉴 항목 클릭 후 자동 닫힘
          document.addEventListener('click', (e) => {
            if (!siteDropdownEl.open) return;
            if (!siteDropdownEl.contains(e.target)) {
              siteDropdownEl.open = false;
            }
          });

          document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape' && siteDropdownEl.open) {
              siteDropdownEl.open = false;
            }
          });

          siteDropdownEl.querySelectorAll('a').forEach((a) => {
            a.addEventListener('click', () => {
              siteDropdownEl.open = false;
            });
          });
        }

        state.view = 'all';
        totalCountEl.classList.add('active');
        todayCountEl.classList.remove('active');
        urgentCountEl.classList.remove('active');

        render();
      } catch (err) {
        updatedEl.textContent = `데이터를 불러오지 못했습니다. (${err.message})`;
      }
    }

    init();
  </script>
</body>
</html>
