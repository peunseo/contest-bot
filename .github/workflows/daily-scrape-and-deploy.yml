name: Daily Scrape And Deploy

on:
  # docs 변경이 push되면 즉시 Pages를 다시 배포합니다.
  push:
    branches:
      - main
    paths:
      - docs/**
      - .github/workflows/daily-scrape-and-deploy.yml
  # 매일 KST 오전 9시 = UTC 00:00
  schedule:
    - cron: "0 0 * * *"
  # 필요할 때 수동 실행
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  scrape-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          # JSON 변경사항을 저장소에 커밋하기 위해 전체 히스토리를 가져옵니다.
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        if: github.event_name != 'push'
        run: npm ci

      - name: Run scraper
        # push 배포에서는 스크래핑을 생략해, 로컬에서 검증한 데이터가 그대로 배포되게 합니다.
        if: github.event_name != 'push'
        env:
          # GitHub Secrets에 값이 있으면 Discord 알림, 없으면 자동 생략됩니다.
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: npm run scrape

      - name: Commit updated data if changed
        if: github.event_name != 'push'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/data/latest.json
          if git diff --cached --quiet; then
            echo "No data changes to commit"
          else
            git commit -m "chore: update daily contest data"
            git push
          fi

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # docs 폴더 전체를 정적 사이트로 배포합니다.
          path: docs

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
